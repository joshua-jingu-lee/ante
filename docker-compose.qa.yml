services:
  ante-qa:
    build:
      context: .
      dockerfile: Dockerfile.qa
    container_name: ante-qa
    ports:
      - "8000:8000"
    environment:
      - ANTE_TEST_MODE=1
      - TELEGRAM_BOT_TOKEN=dummy
      - TELEGRAM_CHAT_ID=dummy
      - QA_ADMIN_PASSWORD=qa-password
      - ANTE_DB_ENCRYPTION_KEY=sm4fkbGXHVNKjw2OvQIrQX5g9qdRGqNKST8pFixdNPk=
    volumes:
      - qa-db:/app/db
      - qa-data:/app/data
      - ante_ante-data:/app/data-prod:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health')"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  qa-db:
  qa-data:
  ante_ante-data:
    external: true
