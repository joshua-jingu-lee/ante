services:
  ante:
    build: .
    ports:
      - "3982:3982"
    volumes:
      - ./config:/app/config
      - ante-data:/app/data
      - ante-db:/app/db
      # JSONL 로그 보존용 named volume.
      # 스펙: docs/specs/logging/05-handlers-and-rotation.md §볼륨 마운트.
      # ANTE_LOG_JSONL=1 게이트가 켜진 경우 컨테이너가 /app/logs 에
      # ante-YYYY-MM-DD.jsonl 파일을 일일 회전 기록하며, 재시작 시 보존된다.
      - ante-logs:/app/logs
    env_file:
      - config/secrets.env

volumes:
  ante-data:
  ante-db:
  ante-logs:
