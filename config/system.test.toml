# Ante E2E 테스트 전용 설정
# docker-compose.test.yml에서 사용한다.

[system]
log_level = "DEBUG"
timezone = "Asia/Seoul"

[db]
path = "db/ante.db"

[data]
path = "data/"

[web]
enabled = true
host = "0.0.0.0"
port = 3982

[eventbus]
history_size = 1000

[broker]
type = "mock"
fill_mode = "immediate"
initial_cash = 100000000.0
default_price = 50000.0
commission_rate = 0.00015
sell_tax_rate = 0.0023

[treasury]
sync_interval_seconds = 60
