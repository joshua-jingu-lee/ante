# Ante 시스템 설정 예시
# 이 파일을 config/system.toml 로 복사하여 사용하세요.

[system]
log_level = "INFO"          # DEBUG, INFO, WARNING, ERROR
timezone = "Asia/Seoul"

[db]
path = "db/ante.db"

[data]
path = "data/"

[web]
enabled = true              # 대시보드 활성화 시 true
host = "0.0.0.0"
port = 3982

[eventbus]
history_size = 1000

[broker]
# KIS 모의투자 설정 — secrets.env 에서 앱키/시크릿/계좌번호 관리
# commission_rate, sell_tax_rate → Account 모델로 이관됨
is_paper = true             # true: 모의투자, false: 실전투자

[treasury]
sync_interval_seconds = 300 # 잔고 동기화 주기 (초)

[reconcile]
enabled = true              # 대사 스케줄러 활성화 여부
interval_seconds = 1800     # 대사 반복 주기 (초, 기본 30분)
