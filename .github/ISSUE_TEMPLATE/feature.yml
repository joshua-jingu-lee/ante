name: "[feat] 기능 요청"
description: 새 기능 추가 요청
labels: ["feature"]
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 기능이 필요한지, 어떤 문제를 해결하는지.
    validations:
      required: true

  - type: textarea
    id: user-stories
    attributes:
      label: 유저스토리
      description: 체크리스트 형태로 작성.
      value: |
        - [ ] {actor}는 {action}을 할 수 있다. 그래서 {benefit}.
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: 기술 노트
      description: 구현 시 참고할 제약 조건, 관련 모듈, 설계 문서 링크 등.

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 조건
      value: |
        - [ ] 기능 구현
        - [ ] 단위 테스트 통과
        - [ ] 관련 문서 갱신 (해당 시)
    validations:
      required: true
