name: "[feat] 기능 요청"
description: 새 기능 추가 요청
labels: ["feature"]
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 기능이 필요한지, 어떤 문제를 해결하는지.
    validations:
      required: true

  - type: textarea
    id: user-stories
    attributes:
      label: 유저스토리
      description: 체크리스트 형태로 작성.
      value: |
        - [ ] {actor}는 {action}을 할 수 있다. 그래서 {benefit}.
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: 비목표
      description: 이번 이슈에서 다루지 않을 것.
    validations:
      required: true

  - type: textarea
    id: contracts
    attributes:
      label: 영향 받는 계약
      description: API / CLI / DB schema / generated type / runtime config 중 해당 항목을 적어주세요.
    validations:
      required: true

  - type: checkboxes
    id: risk-flags
    attributes:
      label: 위험 신호
      options:
        - label: cache / invalidate
        - label: reconnect / reinitialize
        - label: mutable config
        - label: generated artifact sync
        - label: background task / health path

  - type: textarea
    id: verification-scenarios
    attributes:
      label: 검증 시나리오
      description: 기능이 제대로 동작함을 보여줄 2~4개 시나리오를 적어주세요.
      value: |
        - 시나리오 1:
        - 시나리오 2:
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: 기술 노트
      description: 구현 시 참고할 제약 조건, 관련 모듈, 설계 문서 링크 등.

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 조건
      value: |
        - [ ] 기능 구현
        - [ ] 단위 테스트 통과
        - [ ] 관련 문서 갱신 (해당 시)
    validations:
      required: true
