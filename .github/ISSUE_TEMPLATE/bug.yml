name: "[fix] 버그 리포트"
description: 버그 수정 요청
labels: ["bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 현상
      description: 무엇이 잘못되었는지 (에러 메시지, 스크린샷 등).
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 절차
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 어떻게 동작해야 하는지.
    validations:
      required: true

  - type: textarea
    id: analysis
    attributes:
      label: 원인 분석
      description: 추정 원인, 관련 코드 위치. (선택)

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 조건
      value: |
        - [ ] 버그 수정
        - [ ] 재현 시나리오 기반 테스트 추가
    validations:
      required: true
