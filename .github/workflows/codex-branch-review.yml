name: Codex Branch Review

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
      - 'docs/**'
      - 'epic/**'

concurrency:
  group: codex-branch-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-branch-review:
    name: codex-branch-review
    if: ${{ vars.AI_REVIEW_ENABLED == 'true' }}
    runs-on:
      - self-hosted
      - codex-review
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex branch review
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_REF: ${{ github.ref_name }}
        run: scripts/run_ai_review.sh codex branch
