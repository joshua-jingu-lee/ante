name: Post Merge

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged PR number to reconcile linked issues
        required: false
        type: string
      issue_numbers:
        description: Comma-separated issue numbers to reconcile directly
        required: false
        type: string

jobs:
  post-merge:
    name: post-merge
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Update linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            const closingPattern =
              /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?)\s+#(\d+)/gi;

            function parseIssueNumbers(text) {
              return [...(text || "").matchAll(closingPattern)].map((match) => Number(match[1]));
            }

            let pr = null;
            let issueNumbers = [];

            if (eventName === "workflow_dispatch") {
              const prNumberInput = core.getInput("pr_number");
              const issueNumbersInput = core.getInput("issue_numbers");

              if (prNumberInput) {
                pr = (
                  await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: Number(prNumberInput),
                  })
                ).data;

                issueNumbers.push(...parseIssueNumbers(pr.body || ""));

                if (!pr.merged_at) {
                  core.warning(`PR #${pr.number} is not merged. Proceeding with manual reconciliation.`);
                }
              }

              if (issueNumbersInput) {
                issueNumbers.push(
                  ...issueNumbersInput
                    .split(",")
                    .map((value) => Number(value.trim()))
                    .filter((value) => Number.isInteger(value) && value > 0),
                );
              }

              if (!pr && issueNumbers.length === 0) {
                core.setFailed("workflow_dispatch requires pr_number or issue_numbers.");
                return;
              }
            } else {
              pr = context.payload.pull_request;
              issueNumbers.push(...parseIssueNumbers(pr.body || ""));
            }

            const uniqueRefs = [...new Set(issueNumbers)];

            core.info(
              `Linked issues from ${eventName === "workflow_dispatch" ? "manual dispatch" : "merged PR"}: ` +
              `${uniqueRefs.join(", ") || "(none)"}`
            );

            if (uniqueRefs.length === 0) {
              core.warning("No linked issues found; nothing to reconcile.");
              return;
            }

            async function markIssueDone(issueNumber) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const originalBody = issue.data.body || "";
              const updatedBody = originalBody.replace(/^- \[ \]/gm, "- [x]");

              if (updatedBody !== originalBody) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: updatedBody,
                });
              }

              if (issue.data.state !== "closed") {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: "closed",
                });
              }

              const epicMatch = originalBody.match(/(?:에픽|Epic)\s*:\s*#(\d+)/i);
              if (!epicMatch) {
                return;
              }

              const epicNumber = Number(epicMatch[1]);
              const epic = await github.rest.issues.get({ owner, repo, issue_number: epicNumber });
              const epicBody = epic.data.body || "";
              const updatedEpicBody = epicBody.replace(
                new RegExp(`- \\[ \\](.*#${issueNumber}\\b)`, "g"),
                "- [x]$1",
              );

              if (updatedEpicBody !== epicBody) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: epicNumber,
                  body: updatedEpicBody,
                });
              }

              if (!updatedEpicBody.match(/^- \[ \]/m) && epic.data.state !== "closed") {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: epicNumber,
                  state: "closed",
                });
              }
            }

            for (const issueNumber of uniqueRefs) {
              await markIssueDone(issueNumber);
            }
