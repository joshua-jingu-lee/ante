name: Semantic Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (릴리스 없이 버전만 확인)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      # 1. 버전 범프 + 태그 생성
      - name: Run semantic-release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(semantic-release version --no-vcs-release 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(semantic-release version --print-tag 2>/dev/null || echo "")
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      # 이하 단계는 새 릴리스가 있고 dry_run이 아닐 때만 실행
      # 2. 프론트엔드 빌드
      - uses: actions/setup-node@v4
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        working-directory: frontend
        run: npm ci && npm run build

      # 3. Python 패키지 빌드
      - name: Bundle frontend + build Python package
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        run: |
          cp -r frontend/dist src/ante/web/static
          pip install build && python -m build

      # 4. GitHub Release 생성
      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semrel.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      # 5. Docker 이미지 빌드 + push
      - name: Log in to GitHub Container Registry
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.semrel.outputs.released == 'true' && inputs.dry_run == false
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semrel.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
