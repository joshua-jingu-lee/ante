name: PR Approvals

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
    branches:
      - main
      - 'epic/**'

concurrency:
  group: pr-approvals-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-pr-approve:
    name: claude-pr-approve
    if: ${{ vars.AI_REVIEW_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on:
      - self-hosted
      - claude-review
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Claude PR approval
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: scripts/run_ai_review.sh claude pr

  codex-pr-approve:
    name: codex-pr-approve
    if: ${{ vars.AI_REVIEW_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on:
      - self-hosted
      - codex-review
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Codex PR approval
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: scripts/run_ai_review.sh codex pr

  merge-gate:
    name: merge-gate
    if: ${{ vars.AI_REVIEW_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false }}
    needs:
      - claude-pr-approve
      - codex-pr-approve
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
