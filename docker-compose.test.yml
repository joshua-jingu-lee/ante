# E2E 테스트 전용 Docker Compose
#
# 사용법:
#   ./scripts/run-e2e.sh                  # 원커맨드 전체 실행
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from e2e-runner
#   docker compose -f docker-compose.test.yml down -v
#
# 특정 플로우만:
#   docker compose -f docker-compose.test.yml run --rm e2e-runner \
#     pytest tests/e2e/test_flow_login_dashboard.py -m e2e -v

services:
  ante-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "3982:3982"
    environment:
      - ANTE_CONFIG_DIR=/app/config
      - ANTE_TEST_MODE=1
      - TELEGRAM_BOT_TOKEN=dummy-token-for-test
      - TELEGRAM_CHAT_ID=dummy-chat-id-for-test
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3982/api/system/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - e2e-data:/app/data
      - e2e-db:/app/db
    networks:
      - e2e-net

  e2e-runner:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      ante-test:
        condition: service_healthy
    environment:
      - E2E_BASE_URL=http://ante-test:3982
      - E2E_TEST_PASSWORD=test1234
    volumes:
      - ./test-results:/app/test-results
    networks:
      - e2e-net
    command: >
      tests/e2e/ -m e2e
      --base-url http://ante-test:3982
      -v --tb=short
      --output=test-results
      --junit-xml=test-results/e2e-results.xml

networks:
  e2e-net:
    driver: bridge

volumes:
  e2e-data:
  e2e-db:
